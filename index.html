<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50代からの『才能開花』診断</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --main: #8e44ad; --accent: #f39c12; --bg: #fdfaf5; }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background-color: var(--bg); padding: 20px 15px; margin: 0; display: flex; justify-content: center; min-height: 100vh; color: #333; }
        .container { background: white; width: 100%; max-width: 450px; border-radius: 30px; padding: 40px 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--main); height: fit-content; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.3s ease; }
        h1 { font-size: 20px; color: var(--main); text-align: center; margin-bottom: 25px; line-height: 1.6; font-weight: bold; }
        p.intro { text-align: center; color: #666; font-size: 15px; margin-bottom: 30px; line-height: 1.7; }
        .btn-grid { display: grid; gap: 12px; }
        button { background: #fff; border: 2px solid #eee; padding: 18px; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; color: #444; width: 100%; transition: all 0.2s; }
        button:active { background: var(--main); color: white; border-color: var(--main); transform: scale(0.98); }
        .result-card { background: #faf5ff; border: 2px dashed var(--main); padding: 20px; border-radius: 15px; margin-top: 20px; }
        .result-title { color: var(--main); font-size: 18px; font-weight: bold; margin-bottom: 10px; display: block; text-align: center; }
        .link-btn { display: block; background: var(--accent); color: white; padding: 20px; border-radius: 50px; text-decoration: none; margin-top: 25px; font-weight: bold; text-align: center; font-size: 18px; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="container">
    <div id="step-0" class="step active">
        <h1>50代からの起業。<br>次にやるべきことがわかる<br>『才能開花』診断</h1>
        <p class="intro">「私には何ができる？」<br>これまでの経験は、すべて宝物。<br>あなたの才能を形にする一歩を見つけましょう。</p>
        <button onclick="nextStep(1)" style="background:var(--main); color:white; border:none;">才能の扉をひらく</button>
    </div>

    <div id="step-1" class="step">
        <h1>今、どんな状況ですか？</h1>
        <div class="btn-grid">
            <button onclick="nextStep(2)">会社員・お勤め中</button>
            <button onclick="nextStep(2)">主婦・パート</button>
            <button onclick="nextStep(2)">すでに小さく活動中</button>
        </div>
    </div>

    <div id="step-2" class="step">
        <h1>叶えたい未来はどれ？</h1>
        <div class="btn-grid">
            <button onclick="showResult('biz')">一生モノのスキルで自立したい</button>
            <button onclick="showResult('it')">最新のITやAIを使いこなしてみたい</button>
            <button onclick="showResult('fun')">趣味や特技を仕事にしてみたい</button>
        </div>
    </div>

    <div id="result" class="step">
        <h1>あなたの開花ルート</h1>
        <div class="result-card">
            <span id="res-title" class="result-title"></span>
            <p id="res-desc" style="margin-top:10px; font-size:15px; line-height:1.6;"></p>
        </div>
        <a id="lp-link" href="#" class="link-btn">夢を実らせる第一歩へ</a>
    </div>
</div>

<script>
    // ※新しいLIFF IDを発行したら、ここに貼り替えてください
    const MY_LIFF_ID = "2009388480-ncKQGqK3"; 
    const MASTER_LP_URL = "https://liff.line.me/2009352619-jSxzbjZu";

    liff.init({ liffId: MY_LIFF_ID })

    function nextStep(n) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step-' + n).classList.add('active');
    }

    function showResult(key) {
        const resTitle = document.getElementById('res-title');
        const resDesc = document.getElementById('res-desc');
        const linkBtn = document.getElementById('lp-link');
        
        let title = "", desc = "";

        if (key === 'biz') {
            title = "創業マインド × 実務サポート";
            desc = "「やりたい」を形にする事業計画から、ITの活用まで。千田悦子があなたの夢に寄り添い、確実な一歩をサポートします。";
        } else if (key === 'it') {
            title = "AI・デジタル活用コース";
            desc = "難しい言葉は一切なし！50代からでも楽しく使えるAI活用術で、今の仕事を楽に、新しく。ワクワクする未来を作りましょう。";
        } else {
            title = "『夢実工房』プロデュース";
            desc = "あなたの個性を引き出し、形にする。300本以上の実績があるからこそできる、あなただけのブランド作りをご提案。";
        }

        resTitle.innerText = `【${title}】`;
        resDesc.innerText = desc;
        linkBtn.href = MASTER_LP_URL;

        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('result').classList.add('active');
    }
</script>
</body>
</html>
