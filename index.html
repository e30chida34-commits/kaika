<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>才能開花診断</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --main: #8e44ad; --accent: #f39c12; --bg: #fdfaf5; }
        body { font-family: sans-serif; background-color: var(--bg); padding: 20px; color: #333; text-align: center; }
        .container { background: white; max-width: 400px; margin: 0 auto; border-radius: 30px; padding: 40px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--main); }
        .step { display: none; }
        .step.active { display: block; }
        button { background: #fff; border: 2px solid #eee; padding: 15px; border-radius: 15px; width: 100%; margin-bottom: 10px; font-weight: bold; cursor: pointer; }
        button:active { background: var(--main); color: white; }
        .result-card { background: #faf5ff; border: 2px dashed var(--main); padding: 20px; border-radius: 15px; margin-top: 20px; }
        .link-btn { display: block; background: var(--accent); color: white; padding: 20px; border-radius: 50px; text-decoration: none; margin-top: 25px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div id="step-0" class="step active">
        <h2>50代からの『才能開花』診断</h2>
        <p>あなたの才能を形にする一歩を見つけましょう。</p>
        <button onclick="nextStep(1)" style="background:var(--main); color:white; border:none;">診断をはじめる</button>
    </div>
    <div id="step-1" class="step">
        <h2>今、どんな状況ですか？</h2>
        <button onclick="nextStep(2)">会社員・お勤め中</button>
        <button onclick="nextStep(2)">主婦・パート</button>
        <button onclick="nextStep(2)">すでに活動中</button>
    </div>
    <div id="step-2" class="step">
        <h2>叶えたい未来はどれ？</h2>
        <button onclick="showResult('biz')">スキルで自立したい</button>
        <button onclick="showResult('it')">ITやAIを使いこなしたい</button>
        <button onclick="showResult('fun')">特技を仕事にしたい</button>
    </div>
    <div id="result" class="step">
        <h2>あなたの開花ルート</h2>
        <div class="result-card">
            <b id="res-title" style="color:var(--main);"></b>
            <p id="res-desc" style="font-size:14px;"></p>
            <p style="color:#e67e22; font-weight:bold;">只今、先行受付中！</p>
        </div>
        <a id="lp-link" href="#" class="link-btn">Yumemi AI Lab で詳しく見る</a>
    </div>
</div>
<script>
    const MY_LIFF_ID = "2009388480-ncKQGqK3"; 
    const MASTER_LP_URL = "https://liff.line.me/2009352619-jSxzbjZu";
    liff.init({ liffId: MY_LIFF_ID });
    function nextStep(n) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step-' + n).classList.add('active');
    }
    function showResult(key) {
        const resTitle = document.getElementById('res-title');
        const resDesc = document.getElementById('res-desc');
        if (key === 'biz') {
            resTitle.innerText = "【創業マインド×実務サポート】";
            resDesc.innerText = "やりたいを形にする事業計画からIT活用まで伴走します。";
        } else if (key === 'it') {
            resTitle.innerText = "【AI・デジタル活用コース】";
            resDesc.innerText = "50代からでも楽しく使えるAI活用術をご提案。";
        } else {
            resTitle.innerText = "【夢実工房プロデュース】";
            resDesc.innerText = "あなたの個性を引き出し、形にするブランド作りを。";
        }
        document.getElementById('lp-link').href = MASTER_LP_URL;
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('result').classList.add('active');
    }
</script>
</body>
</html>
